<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrandShow — Sign In</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <img src="../assets/images/icons/logo.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <svg style="display:none" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="nav-logo-text">Brand<span>Show</span></span>
    </a>
    <div class="nav-right">
      <button class="lang-toggle" id="langBtn" data-sound="click">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span class="lang-label">فارسی</span>
      </button>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Form Side -->
      <div class="auth-form-side">
        <h2 class="auth-title" data-i18n="welcomeBack">Welcome back!</h2>

        <div class="form-msg" id="li-msg"></div>

        <form id="loginForm" autocomplete="off">
          <!-- Username / Email -->
          <div class="form-group">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="li-username" data-i18n-ph="usernamePlaceholder" placeholder="Username or Email" required>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="li-password" data-i18n-ph="passwordPlaceholder" placeholder="Password" required>
              <button type="button" class="eye-btn" id="li-eye" data-sound="click">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- Remember / Forgot -->
          <div class="form-row">
            <label class="form-check">
              <input type="checkbox" id="li-remember">
              <span data-i18n="rememberMe">Remember me</span>
            </label>
            <a href="#" class="forgot-link" data-sound="click" data-i18n="forgotPassword">Forgot password?</a>
          </div>

          <button type="submit" class="btn-auth" data-sound="submit">
            <span data-i18n="signInBtn">SIGN IN</span>
          </button>
        </form>

        <p class="auth-switch">
          <span data-i18n="noAccount">Don't have an account?</span>
          <a href="signup.html" data-sound="click" data-i18n="signUp">Sign up</a>
        </p>
      </div>

      <!-- Panel Side -->
      <div class="auth-panel-side">
        <h2 data-i18n="gladToSee">Glad to see You!</h2>
        <p>Welcome back! Your next big idea is waiting to be submitted.</p>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
