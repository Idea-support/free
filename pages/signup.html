<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrandShow — Sign Up</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <img src="../assets/images/icons/logo.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <svg style="display:none" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="nav-logo-text">Brand<span>Show</span></span>
    </a>
    <div class="nav-right">
      <button class="lang-toggle" id="langBtn" data-sound="click">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span class="lang-label">فارسی</span>
      </button>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Form Side -->
      <div class="auth-form-side">
        <h2 class="auth-title" data-i18n="helloFriend">Hello, friend!</h2>

        <div class="form-msg" id="su-msg"></div>

        <form id="signupForm" autocomplete="off">
          <!-- Name -->
          <div class="form-group">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="su-name" data-i18n-ph="namePlaceholder" placeholder="Name" required>
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" id="su-email" data-i18n-ph="emailPlaceholder" placeholder="Email" required>
            </div>
          </div>

          <!-- Phone -->
          <div class="form-group">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <input type="tel" id="su-phone" data-i18n-ph="phonePlaceholder" placeholder="Phone Number" required>
            </div>
          </div>

          <!-- Verify Phone -->
          <div class="form-group">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0 1 12 2.944a11.955 11.955 0 0 1-8.618 3.04A12.02 12.02 0 0 0 3 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
              <input type="text" id="su-verify" data-i18n-ph="verifyPlaceholder" placeholder="Verify Phone Number" maxlength="6" required>
            </div>
            <p class="verify-hint" id="verify-hint">Enter your phone number above to start verification.</p>
            <div class="verify-code-display" id="verify-code-display"></div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="su-password" data-i18n-ph="passwordPlaceholder" placeholder="Password" required>
              <button type="button" class="eye-btn" id="su-eye1" data-sound="click">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="su-confirm" data-i18n-ph="confirmPasswordPlaceholder" placeholder="Confirm Password" required>
              <button type="button" class="eye-btn" id="su-eye2" data-sound="click">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <!-- Terms -->
          <div class="form-group">
            <label class="form-check">
              <input type="checkbox" id="su-terms">
              <span data-i18n="terms">I've read and agree to</span>
              <a href="#" data-i18n="termsLink">Terms &amp; Conditions</a>
            </label>
          </div>

          <button type="submit" class="btn-auth" data-sound="submit">
            <span data-i18n="createAccount">CREATE ACCOUNT</span>
          </button>
        </form>

        <p class="auth-switch">
          <span data-i18n="alreadyAccount">Already have an account?</span>
          <a href="login.html" data-sound="click" data-i18n="signIn">Sign in</a>
        </p>
      </div>

      <!-- Panel Side -->
      <div class="auth-panel-side">
        <h2 data-i18n="gladToSee">Glad to see You!</h2>
        <p>Join thousands of innovators sharing ideas every month and compete for full funding.</p>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
